<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="2025_twt_workskin.css">

    <style>
        /* to make preview look more like ao3 */
        p {margin-bottom: 1.7em;}
        .twt-replybox p {margin-bottom: 1em;}
        .twt-replybox {margin-top: 0em;}
    </style>

</head>

<body>


    <!-- Main Tweet -->
    <div class="twt">
        <div class="twt-header">
            <div class="twt-icon-container">
                <p><img class="twt-icon" src="LINK_ICON"></p>
            </div>
            <div class="twt-id">
                <p><span class="twt-name">NAME</span><br />
                    <span class="twt-handle">@HANDLE</span>
                </p>
            </div>
        </div>
        <div class="twt-content">
            <p>TWEET_TEXT</p>
        </div>
        <p><span class="twt-hl">#TAG</span> <span class="twt-hl">#TAG</span> <span class="twt-hl">#TAG</span></p>
        <!-- picture here -->
        <div class="twt-timestamp">
            <p>6:32 PM · Dec 4, 2025</p>
        </div>
        <hr class="twt-sep">
        <div class="twt-stat1">
            <p><strong>NUMBER</strong> Retweets <strong>NUMBER</strong> Quote Tweets <strong>NUMBER</strong> Likes</p>
        </div>
        <!-- Reply here -->
    </div>

    <p></p>

</body>

</html>
